<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrendCart - Premium Clothing</title>
  <style>
    body { margin:0; font-family:Arial; background:white; }
    header { padding:20px; text-align:center; font-size:28px; font-weight:bold; }
    .hero { padding:60px 20px; text-align:center; }
    .products { display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:20px; padding:20px; }
    .card { border:1px solid #ddd; border-radius:10px; overflow:hidden; padding-bottom:15px; }
    .card img { width:100%; height:320px; object-fit:cover; }
    .card h3 { padding:10px; font-size:20px; }
    .card button { margin:10px; padding:10px 20px; border:none; border-radius:5px; background:black; color:white; }
  </style>
</head>
<body>
<header>TrendCart</header>
<section class="hero"><h2>Premium Trendy Clothing For You</h2></section>
<section class="products">
  <div class="card">
    <img src="photo1.jpg" />
    <h3>Oversized Blue Tee</h3>
    <button>Order Now</button>
  </div>
  <div class="card">
    <img src="photo2.jpg" />
    <h3>Pink Stripe Shirt</h3>
    <button>Order Now</button>
  </div>
  <div class="card">
    <img src="photo3.jpg" />
    <h3>Red Splash Jacket</h3>
    <button>Order Now</button>
  </div>
  <div class="card">
    <img src="photo4.jpg" />
    <h3>Black Street Jacket</h3>
    <button>Order Now</button>
  </div>
</section>
</body>
</html>
